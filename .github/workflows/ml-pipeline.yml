name: ML Pipeline

# When should this pipeline run?
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1"  # every Monday at 6:00 AM UTC
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Lint code
  # ──────────────────────────────────────────────
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install flake8

      - name: Run flake8
        run: flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

  # ──────────────────────────────────────────────
  # Job 2: Run tests
  # ──────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────
  # Job 3: Train and evaluate model
  # ──────────────────────────────────────────────
  train:
    name: Train and Evaluate
    runs-on: ubuntu-latest
    needs: test  # only runs if tests pass

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate sample data
        run: |
          python - <<'EOF'
          import numpy as np, pandas as pd
          from pathlib import Path
          path = Path("data/heart_combined.csv")
          if path.exists():
              print("Data already exists, skipping.")
          else:
              path.parent.mkdir(parents=True, exist_ok=True)
              rng = np.random.default_rng(42)
              n = 500
              age = rng.integers(30, 80, n).astype(float)
              cp = rng.integers(0, 4, n).astype(float)
              exang = rng.integers(0, 2, n).astype(float)
              ca = rng.integers(0, 4, n).astype(float)
              signal = (age > 55).astype(int) + (cp > 1).astype(int) + (exang == 1).astype(int) + (ca > 1).astype(int)
              pd.DataFrame({
                  "age": age, "sex": rng.integers(0,2,n).astype(float), "cp": cp,
                  "trestbps": rng.integers(90,200,n).astype(float), "chol": rng.integers(150,400,n).astype(float),
                  "fbs": rng.integers(0,2,n).astype(float), "restecg": rng.integers(0,3,n).astype(float),
                  "thalach": rng.integers(70,200,n).astype(float), "exang": exang,
                  "oldpeak": rng.uniform(0,6,n).round(1), "slope": rng.integers(0,3,n).astype(float),
                  "ca": ca, "thal": rng.integers(0,4,n).astype(float),
                  "target": ((signal >= 2).astype(int)),
              }).to_csv(path, index=False)
              print(f"Generated synthetic data ({n} rows).")
          EOF

      - name: Train model
        run: python src/train.py

      - name: Upload metrics as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-metrics
          path: metrics/results.json

      - name: Upload model as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/model.pkl

